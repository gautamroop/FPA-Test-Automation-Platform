<script type="text/ng-template" id="aqTrialLicenseModalTmpl">
    <div class="qas-license-agreement-dialog">
        <header class="qa-tnc-header">
            <div class="qa-accelq-logo"></div>
            <p>Trial License Agreement</p>
        </header>
        <div class="qa-tnc-content">
            <p class="qa-tnc-greet">Hi, {{options.vars.userName}}!</p>
            <p class="aqi--margin-top-15">Welcome aboard! Before you start exploring the trial access, we would like you to review and acknowledge the terms of use.</p>
            <br>
            <p>Here are some key terms of usage of ACCELQ (Service). You can find the complete <a class="qa-tnc-link" href="https://www.accelq.com/terms-and-conditions/" target="_blank">Terms & Conditions</a> here.</p>
        
            <ul class="qa-tnc-list">
                <li class="aqi--margin-bottom-16" >You shall use the Service only for your own internal use for evaluation. Not to be used for production requirements.</li>
                <li  class="aqi--margin-bottom-16">You may not copy, reproduce, modify, translate, prepare derivative works of, de-compile, reverse engineer, disassemble or otherwise attempt to derive source code from the Service.</li>
                <li  class="aqi--margin-bottom-16">You may not use, evaluate or view the Service for the purpose of building or aiding to build a competitive service or product.</li>
            </ul>
            <div class="qa-tnc-checkbox qas-checkbox-wrapper " ng-click="options.vars.tick = !options.vars.tick;">
                <button type="button" class="qas-checkbox  aqi--margin-right-10" ng-class="{ 'qa-checked' : options.vars.tick}">
                    <i class="qai-xs-tick qa-selected qa-checkbox-tick"></i>
                </button>
                <div class="qa-checkbox-label">
                    I agree to the above and all other Terms & Conditions of using ACCELQ for trail and evaluation.
                </div>
            </div>  
        </div>
        <div class="qa-tnc-footer">
            <div>
                <button type="button" ng-click="options.methods.clear()"  class="aqs-button-default qa-tnc-decline-button">I, Decline</button>
            </div>
            <div>
                <button type="button" ng-click="options.methods.save()" ng-disabled="!options.vars.tick" class="qas-btn-primary pull-right qa-tnc-accept-button">I, Accept</button>
            </div>
        </div>    
    </div>
</script>

<script type="text/ng-template" id="aqPasscodePromptDialogTmpl">

            <div aq-input-text qtheme="true" value="options.passCode" required></div>
            <div class="qas-help-text qa-italic qa-small" ng-show="!options.errorMessage">Passcode found in top-right portion of notification</div>
            <div class="qas-title qa-light qas-error-text qa-small" ng-show="options.errorMessage">{{options.errorMessage}}</div>

<!-- ngInclude: 'app/configuration/templates/content/conf-manage-projects-content.html' --><div data-ng-include="'app/configuration/templates/content/conf-manage-projects-content.html'" class="ng-scope"><script type="text/ng-template" id="aqCreateProjectTmpl" class="ng-scope">
    <form aq-form aq-form-validate novalidate>
        <div class="aqs-full-width" ng-show="options.errorMessage">
            <div class="qas-section-message qa-error aqs-display-flex aqi--margin-bottom-15">
                <div class="qai-24-section-message-error aqi--margin-right-10"></div>
                <div class="aqi--align-down-3">{{options.errorMessage}}</div>
            </div>            
        </div>
        <div class="aqs-adminproject-template" ng-if="options.selectedTab == options.enums.TABS.PROJECT_TEMPLATES">
            <div ng-if="options.templates" class="aq-projecttemplate-wrapper">
                <div class="aqs-display-flex aq-flex-wrap">
                    <div ng-repeat="item in options.templates track by $index" 
                        class="aq-project-item" ng-click="options.templateSelect($index)" 
                        ng-class="{'aq-active': options.selectedTemplateIndex == $index, 'aq-disabled': item.disabled}">
                        <div class="qa-overlay" ng-if="item.disabled"></div>
                        <img ng-src="{{item.tpAppType.thumbnail}}" alt="Project Thumbnail" class="aq-project-thumbnail"/>
                        <div class="qas-title qa-title aqi--margin-top-10">{{item.projectDisplayName}}</div>
                        <div class="qas-button-text">{{item.cloudPlatform && item.cloudPlatform.cpRelease || ""}}</div>
                    </div>
                </div>
            </div>
        </div>
        <div ng-if="options.selectedTab == options.enums.TABS.PROJECT_BASIC_DETAILS">
            <div class="qas-form-group">
                <div class="qas-form-field">
                    <label class="qa-label">
                        Project name
                    </label>
                    <div aq-entity-name id="uniquename" label="Name" value="options.newProject.projectDisplayName" maxsize="64" pattern="{{options.projectNameRegex}}" patterntext="{{options.patternText}}" name="projectName" autofocus qtheme="true" required></div>
                </div>
                <div class="qas-form-field">
                    <label class="qa-label">
                        Description
                    </label>
                    <div aq-text-area name="description" label="Description" value="options.newProject.description" Maxlength="256" resize="true"></div>
                </div>
                <div class="qas-form-field aqs-display-flex aq-valign-center" ng-if="options.selectedTemplateIndex == 0">                   
                    <button class="qas-checkbox" ng-class="{'qa-checked': options.isConfigSelected}" ng-click="options.isConfigSelected = !options.isConfigSelected">
                        <i class="qai-xs-tick qa-selected qa-checkbox-tick"></i>
                    </button>                  
                    <div class="aqi--margin-left-5">
                        Copy configuration from an existing Project
                    </div>                    
                </div>
                <div class="qas-form-field qa-standard" ng-if="options.isConfigSelected">
                    <label class="qa-label">Select Project for configuration</label>
                    <div qa-drop-down items="options.existingProjects" text-property="projectDisplayName" uid-property="pid" selected-item="options.selectedProj" search="true" on-select="options.onProjSelect(e)"></div>
                </div>
            </div>
        </div>
        <div ng-if="options.selectedTab == options.enums.TABS.PROJECT_USER_DETAILS">
            <div class="qas-form-group">
                <div class="qas-form-field aqi--margin-bottom-25">
                    <div style="height: 300px" qa-list-editor columns="options.inlineGridEditorOptions.columns" items="options.inlineGridEditorOptions.items"></div>
                </div>                
            </div>
        </div>   
    </form>
</script>

<script type="text/ng-template" id="aqAddProjectTemplate" class="ng-scope">
    <div class="aqs-modal-normal">
        <div class="container-fluid aqs-conf-project-modal">
            <form id="manageProjectForm" class="aqForm" aq-form  aq-form-validate
                            on-discard="options.close()" on-submit="options.onSave()">
                <div class="row">
                    <div class="header-block col-md-12 aqs-no-padding">
                        <div class="title-row col-md-12">
                            <span class="text">{{options.title}}</span>
                            <div class="aqi-md-cross pull-right" ng-click="options.close();"></div>
                        </div>
                    </div>
                    <div class="content-block col-md-12">
                        <div id="aqManageProjectModalMsg" class="col-md-12 aqs-no-padding"></div>
                        <div class="content-row col-md-12">
                            <div class="col-md-12">Name</div>
                            <div class="col-md-10">
                                <div aq-entity-name id="uniquename" label="Name" value="options.newProject.projectDisplayName" maxsize="64" pattern="{{options.projectNameRegex}}" patterntext="{{options.patternText}}" name="projectName" autofocus required></div>
                            </div>
                        </div>
                        <div class="content-row col-md-12">
                            <div class="col-md-12">Description</div>
                            <div class="col-md-10">
                                <div aq-text-area  name="description" label="Description" value="options.newProject.description" Maxlength="256"></div>
                            </div>
                        </div>
                        <div class="content-row col-md-12" ng-if="options.isBlankProject || options.isEdit">
                            <div class="col-md-12"><span >Users</span></div>
                            <div class="col-md-6">
                                <div class="user-select" aq-search-drop-down on-select="options.onUserSelect(e)" items="options.userList" label=""
                                    name="usersList" selected-item = "options.selectedUser" value="options.selectedUserName" search-options="options.searchOptions" chosen-options="options.chosenOptions" display-format="options.displayFormat(e)" text="Select" text-property="text" value-property="value"></div>
                            </div>
                            <div class="col-md-2 aqs-no-padding">
                                <div class="aqs-button-primary" style="padding:2px 6px;" ng-click="options.addUser()" ng-class="{'disabled':options.isDisabledAddBtn}">Add User</div>
                            </div>
                            <div class="col-md-1"></div>
                        </div>
                        <div class="content-row col-md-12" ng-if="!options.isBlankProject && !options.isEdit">
                            <div class="col-md-12"> <span>Copy Config From</span> </div>
                            <div class="col-md-6">
                                <div aq-drop-down items="options.existingProjects" text-property="projectDisplayName" value-property="pid" value="options.selectedProj" on-select="options.onProjSelect(e)"></div>
                            </div>
                        </div>
                        <div class="content-row col-md-12" ng-show="options.isBlankProject || options.isEdit">
                            <div class="col-md-12">
                                <div class="aq-userlist">
                                    <div class="col-md-12 aqs-no-padding">
                                        <div class="row aqs-no-padding aqs-no-margin">
                                            <div class="col-md-4 aqs-no-padding">
                                                <div class="aqs-section-header">USER NAME</div>
                                            </div>
                                            <div class="col-md-3 aqs-no-padding">
                                                <div class="aqs-section-header aqs-align-center">IS ADMIN</div>
                                            </div>
                                            <div class="col-md-4">
                                                <div class="aqs-section-header">ROLE</div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-12 aq-user" ng-repeat="user in options.addUsersList track by $index"  ng-if="options.addUsersList.length >0">   
                                        <div class="col-md-4 aqs-no-padding">
                                            <div class="aqs-overflow-ellipsis" title="{{(user.value == options.currentUser.value || user.isSiteAdmin) ? options.tooltipForTA : user.text }}">{{user.text}}</div>
                                            <div class="aqs-overflow-ellipsis aqs-para-sub-text" title="{{user.email}}">{{user.email}}</div>
                                        </div>
                                        <div class="col-md-3 aqs-no-padding aqs-align-center">
                                            <div class="aqs-checkbox aq-legacy aq-component" ng-class="{'aq-checked' : user.isAdmin}" ng-click="user.isAdmin = !user.isAdmin">
                                                <i class="fa fa-check aq-checkbox-tick"></i>
                                            </div>
                                        </div>
                                        <div class="col-md-4 aq-component" ng-class="{'aq-disabled': false }">
                                            <div class="aq-roledropdown" aq-drop-down items="options.rolesList" text-property="roleName" value-property="pid" value="user.rolePid" required></div>
                                        </div>
                                        <div class="col-md-1">
                                            <div class="aq-actionable aqi-md-trash aqi--align" ng-click=" !(user.value == options.currentUser.value || user.isSiteAdmin) && options.deleteUser(user)" ng-class="{ 'aq-mild-disabled' : (user.value == options.currentUser.value || user.isSiteAdmin) }" title="{{(user.value == options.currentUser.value || user.isSiteAdmin) ? options.tooltipForTA : ''}}"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="footer-block col-md-12">
                        <div class="button-row col-md-12 aqs-no-padding">
                            <div class="button-default aq-form-discard">Cancel</div>
                            <div class="button-primary aq-form-save">OK</div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>
</script>

                <div class="row">

                            </div>

                        <div class="aq-globalerror" ng-show="options.errorMsg">{{options.errorMsg}}</div>

                        <div class="aqs-alerts aq-warning aqi--margin-top-5" ng-show="options.childBranches.length">
                            <div class="aq-message"> 
                                <span>{{options.warnMessage}}</span>
                                <ol>
                                    <li class="" ng-repeat="proj in options.childBranches">

                                    </li>
                                </ol>
                            </div>                            
                        </div>                        
                        <div class="aq-content">
                            <div aq-check-box class="aq-form-control" name="warning1" label="All scenarios, contexts and actions will be deleted." value="options.warning1" autofocus required on-select="options.removeMsg()"></div>
                            <div aq-check-box class="aq-form-control" name="warning2" label="All test results, data and parameters will be deleted." value="options.warning2" autofocus required on-select="options.removeMsg()"></div>
                            <div aq-check-box class="aq-form-control" name="warning3" label="All Extension libraries owned by this Project will be deleted unless they are used by other Projects." value="options.warning3" autofocus required on-select="options.removeMsg()"></div>

                    <div class="aq-footer col-md-12">
                        <div class="col-md-7 col-md-offset-5 aqs-no-padding aqs-align-right">

                            <div class="aqs-button-primary" ng-click="options.deleteProject()" style="margin-left: 10px;">OK, Delete Project</div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

<script type="text/ng-template" id="aqAppVariantsSelectionTmpl" class="ng-scope">

<script type="text/ng-template" id="aqAppVariantRenameConflictTmpl" class="ng-scope">

             <div class="aqi--margin-top-4"> To prevent duplicates, the system will automatically adjust the names.</div>

            </div>
        </div>
        <div class="aqs-display-flex aq-column" ng-if="options.renamedVariantOptions.variantsList.length>0">
            <div class="aqs-bold-text aqi--margin-top-16 aqi--margin-bottom-10"> For Renamed Variants:  </div>

        <div class="qas-paragraph aqi--margin-top-20 aqs-display-flex aq-column">
            <div> All other selected changes will be applied as normal. </div>
            <div class="aqi--margin-top-4"> Do you want to proceed with these automatic adjustments? </div>
        </div>
    </form>
</script></div>
